services:
  - type: web
    name: learning-disorder-intelligence
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_conf.py dashboard_server:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TZ
        value: Asia/Kolkata
      - key: PYTHONUNBUFFERED
        value: "1"
