<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Test</title>
  <link rel="stylesheet" href="/web/styles.css?v=20260626v">
</head>
<body class="module-page">
  <div class="page-shell">
    <header class="hero panel">
      <div class="hero-copy">
        <p class="eyebrow">Adaptive Test</p>
        <h1>Adaptive Screening</h1>
        <p class="hero-text">A dedicated page for the backend-selected item flow, with the same dashboard logic running inside a focused route.</p>
        <div class="language-switcher">
          <label for="adaptiveDashboardLanguage">Preferred language</label>
          <div class="language-switcher-row">
            <select id="adaptiveDashboardLanguage">
              <option value="English">English</option>
              <option value="Hindi">Hindi</option>
              <option value="Bengali">Bengali</option>
            </select>
          </div>
        </div>
        <div class="action-row wizard-nav-row">
          <button class="ghost-btn small-btn" type="button" onclick="window.location.href='/web/index.html'">Dashboard</button>
          <button class="ghost-btn small-btn" type="button" onclick="window.location.href='/web/analytics.html'">Analytics Hub</button>
          <button class="ghost-btn small-btn" type="button" onclick="window.location.href='/web/records.html'">Records and Reports</button>
        </div>
      </div>
    </header>

    <section class="panel" style="padding: 16px;">
      <iframe id="adaptiveFrame" class="module-frame" src="/web/index.html#adaptiveView" title="Adaptive Test dashboard section"></iframe>
    </section>
  </div>
  <script>
    const adaptiveFrame = document.getElementById("adaptiveFrame");
    const adaptiveLanguage = document.getElementById("adaptiveDashboardLanguage");
    function syncAdaptiveLanguage() {
      const doc = adaptiveFrame?.contentWindow?.document;
      const select = doc?.getElementById("dashboardLanguage");
      if (select && adaptiveLanguage) {
        select.value = adaptiveLanguage.value;
        select.dispatchEvent(new Event("change", { bubbles: true }));
      }
    }
    adaptiveLanguage?.addEventListener("change", syncAdaptiveLanguage);
    adaptiveFrame?.addEventListener("load", syncAdaptiveLanguage);
  </script>
</body>
</html>
